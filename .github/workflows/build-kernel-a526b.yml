# =============================================================================
#  LineageOS 23.2 (Android 16) Kernel Builder — Samsung Galaxy A52 5G (a526b)
#  Chipset : Qualcomm SM7225 (Snapdragon 750G)
#  Kernel  : 4.19 (from a52xq-dev/kernel)
#  BPF fix : techyminati/fuck-bpf (sixteen-qpr2 branch)
#  FIX     : Clang now cloned from LineageOS GitHub (wget URL was broken)
# =============================================================================

name: "Build LineageOS 23.2 Kernel (SM-A526B)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable tmate debug session on failure'
        required: false
        default: 'false'

jobs:
  build:
    name: "Kernel Build — a526b / SM7225 / 4.19"
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      KERNEL_DIR: ${{ github.workspace }}
      ARCH: arm64
      SUBARCH: arm64
      DEVICE_CODENAME: a526b
      DEFCONFIG: vendor/a52xq_defconfig
      OUT: ${{ github.workspace }}/out
      LOCALVERSION: "-a526b-lineage23"

    steps:
      # ── 0. Checkout kernel source ───────────────────────────────────────
      - name: "Checkout kernel source"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 1. Install build dependencies ──────────────────────────────────
      - name: "Install build dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio \
            curl flex git kmod libelf-dev libssl-dev \
            lz4 python3 rsync unzip wget zip \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            libncurses-dev libncurses5 libncurses5-dev

      # ── 2. Clone Clang r416183b from LineageOS (replaces broken wget) ───
      - name: "Cache Clang r416183b"
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain/clang
          key: lineageos-clang-r416183b-v2

      - name: "Clone Clang r416183b (LineageOS prebuilts)"
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git \
            ${{ github.workspace }}/toolchain/clang
          echo "Clang version:"
          ${{ github.workspace }}/toolchain/clang/bin/clang --version

      # ── 3. Clone GCC aarch64 ────────────────────────────────────────────
      - name: "Cache GCC aarch64"
        id: cache-gcc64
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain/gcc64
          key: lineageos-gcc-aarch64-4.9-v1

      - name: "Clone GCC aarch64 (LineageOS prebuilts)"
        if: steps.cache-gcc64.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            ${{ github.workspace }}/toolchain/gcc64

      # ── 4. Clone GCC arm32 ──────────────────────────────────────────────
      - name: "Cache GCC arm32"
        id: cache-gcc32
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain/gcc32
          key: lineageos-gcc-arm32-4.9-v1

      - name: "Clone GCC arm32 (LineageOS prebuilts)"
        if: steps.cache-gcc32.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            ${{ github.workspace }}/toolchain/gcc32

      # ── 5. Export toolchain paths ────────────────────────────────────────
      - name: "Export toolchain paths"
        run: |
          CLANG_DIR="${{ github.workspace }}/toolchain/clang"
          GCC64_DIR="${{ github.workspace }}/toolchain/gcc64"
          GCC32_DIR="${{ github.workspace }}/toolchain/gcc32"

          echo "CLANG_DIR=${CLANG_DIR}"   >> $GITHUB_ENV
          echo "GCC64_DIR=${GCC64_DIR}"   >> $GITHUB_ENV
          echo "GCC32_DIR=${GCC32_DIR}"   >> $GITHUB_ENV
          echo "PATH=${CLANG_DIR}/bin:${GCC64_DIR}/bin:${GCC32_DIR}/bin:${PATH}" \
               >> $GITHUB_ENV

          ${CLANG_DIR}/bin/clang --version
          ${GCC64_DIR}/bin/aarch64-linux-android-gcc --version

      # ── 6. Fetch fuck-bpf ────────────────────────────────────────────────
      - name: "Clone fuck-bpf (sixteen-qpr2)"
        run: |
          git clone --depth=1 --branch sixteen-qpr2 \
            https://github.com/techyminati/fuck-bpf \
            /tmp/fuck-bpf
          echo "fuck-bpf files:"
          find /tmp/fuck-bpf -type f | sort

      # ── 7. Create out/ ────────────────────────────────────────────────────
      - name: "Create out/ directory"
        run: mkdir -p ${{ env.OUT }}

      # ── 8. Generate .config ───────────────────────────────────────────────
      - name: "Generate .config from defconfig"
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -e

          MAKE_ARGS=(
            O="${OUT}"
            ARCH="${ARCH}"
            SUBARCH="${SUBARCH}"
            CC="${CLANG_DIR}/bin/clang"
            CLANG_TRIPLE="aarch64-linux-gnu-"
            CROSS_COMPILE="${GCC64_DIR}/bin/aarch64-linux-android-"
            CROSS_COMPILE_ARM32="${GCC32_DIR}/bin/arm-linux-androideabi-"
            LLVM=1
            LLVM_IAS=1
          )

          if make "${MAKE_ARGS[@]}" "${DEFCONFIG}" 2>/dev/null; then
            echo "Used: ${DEFCONFIG}"
          elif make "${MAKE_ARGS[@]}" a52xq_defconfig 2>/dev/null; then
            echo "Used: a52xq_defconfig"
          else
            echo "Available defconfigs:"
            ls arch/arm64/configs/
            exit 1
          fi

      # ── 9. Apply BPF Kconfig overrides ───────────────────────────────────
      - name: "Apply BPF Kconfig overrides"
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          CONFIG_FILE="${OUT}/.config"

          set_config() {
            if grep -q "^$1=" "$CONFIG_FILE"; then
              sed -i "s|^$1=.*|$1=$2|" "$CONFIG_FILE"
            else
              echo "$1=$2" >> "$CONFIG_FILE"
            fi
          }
          disable_config() {
            if grep -q "^$1=" "$CONFIG_FILE"; then
              sed -i "s|^$1=.*|# $1 is not set|" "$CONFIG_FILE"
            else
              echo "# $1 is not set" >> "$CONFIG_FILE"
            fi
          }

          set_config CONFIG_BPF y
          set_config CONFIG_BPF_SYSCALL y
          set_config CONFIG_BPF_EVENTS y
          disable_config CONFIG_BPF_JIT_ALWAYS_ON
          disable_config CONFIG_BPF_LSM
          disable_config CONFIG_DEBUG_INFO_BTF

          # Merge fuck-bpf kernel config fragments if present
          FRAG_DIR="/tmp/fuck-bpf/kernel/configs"
          if ls "${FRAG_DIR}"/*.config 2>/dev/null | grep -q .; then
            for frag in "${FRAG_DIR}"/*.config; do
              echo "Merging: ${frag}"
              scripts/kconfig/merge_config.sh -m -O "${OUT}" "${OUT}/.config" "${frag}" || true
            done
          fi

          make O="${OUT}" ARCH="${ARCH}" olddefconfig

          echo "BPF config result:"
          grep -iE "BPF|btf" "${OUT}/.config" | head -20

      # ── 10. Set LOCALVERSION ──────────────────────────────────────────────
      - name: "Set LOCALVERSION"
        run: |
          sed -i "s|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION=\"${LOCALVERSION}\"|" \
            "${OUT}/.config" 2>/dev/null || \
          echo "CONFIG_LOCALVERSION=\"${LOCALVERSION}\"" >> "${OUT}/.config"
          echo "CONFIG_LOCALVERSION_AUTO=n" >> "${OUT}/.config"

      # ── 11. Build kernel ──────────────────────────────────────────────────
      - name: "Build kernel"
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -e
          JOBS=$(nproc --all)
          echo "Building with ${JOBS} jobs..."
          BUILD_START=$(date +%s)

          make \
            O="${OUT}" \
            ARCH="${ARCH}" \
            SUBARCH="${SUBARCH}" \
            CC="${CLANG_DIR}/bin/clang" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CROSS_COMPILE="${GCC64_DIR}/bin/aarch64-linux-android-" \
            CROSS_COMPILE_ARM32="${GCC32_DIR}/bin/arm-linux-androideabi-" \
            LLVM=1 \
            LLVM_IAS=1 \
            -j"${JOBS}" \
            Image.gz dtbs modules 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"

          BUILD_END=$(date +%s)
          ELAPSED=$(( BUILD_END - BUILD_START ))
          echo "Done in $(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"

      # ── 12. Create Image.gz-dtb ───────────────────────────────────────────
      - name: "Create Image.gz-dtb"
        run: |
          KERNEL_IMAGE="${OUT}/arch/arm64/boot/Image.gz"
          DTB_FILES=$(find "${OUT}/arch/arm64/boot/dts" \
            \( -name "sm7225*.dtb" -o -name "*a52xq*.dtb" \) 2>/dev/null | sort)

          if [ -n "${DTB_FILES}" ]; then
            cat ${KERNEL_IMAGE} ${DTB_FILES} > "${GITHUB_WORKSPACE}/Image.gz-dtb"
            echo "Image.gz-dtb created."
          else
            cp "${KERNEL_IMAGE}" "${GITHUB_WORKSPACE}/Image.gz-dtb"
            echo "No DTBs found — copied Image.gz as Image.gz-dtb"
          fi

      # ── 13. Stage artifacts ───────────────────────────────────────────────
      - name: "Stage build artifacts"
        run: |
          STAGE="${GITHUB_WORKSPACE}/kernel-artifacts"
          mkdir -p "${STAGE}/modules"

          cp "${OUT}/arch/arm64/boot/Image.gz" "${STAGE}/" 2>/dev/null || true
          cp "${GITHUB_WORKSPACE}/Image.gz-dtb" "${STAGE}/" 2>/dev/null || true

          DTBO=$(find "${OUT}" -name "dtbo.img" 2>/dev/null | head -1)
          [ -n "${DTBO}" ] && cp "${DTBO}" "${STAGE}/"

          find "${OUT}" -name "*.ko" -exec cp {} "${STAGE}/modules/" \; 2>/dev/null || true
          echo "Modules: $(ls "${STAGE}/modules/" | wc -l)"

          cp "${GITHUB_WORKSPACE}/build.log" "${STAGE}/" 2>/dev/null || true
          ls -lh "${STAGE}/"

      # ── 14. AnyKernel3 zip ────────────────────────────────────────────────
      - name: "Build AnyKernel3 flashable zip"
        run: |
          cd "${GITHUB_WORKSPACE}"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          cp kernel-artifacts/Image.gz-dtb AnyKernel3/ 2>/dev/null || \
          cp kernel-artifacts/Image.gz     AnyKernel3/ 2>/dev/null || true

          if ls kernel-artifacts/modules/*.ko 2>/dev/null | grep -q .; then
            mkdir -p AnyKernel3/modules/system/lib/modules
            cp kernel-artifacts/modules/*.ko AnyKernel3/modules/system/lib/modules/
          fi

          cat > AnyKernel3/anykernel.sh << 'EOF'
# AnyKernel3 — SM-A526B — LineageOS 23.2
properties() { '
kernel.string=LineageOS 23.2 Kernel for SM-A526B
do.devicecheck=1
do.modules=0
do.cleanup=1
do.cleanuponabort=0
device.name1=a526b
device.name2=SM-A526B
device.name3=a52xq
'; }

block=/dev/block/platform/soc/1d84000.ufshc/by-name/boot;
is_slot_device=0;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;

. tools/ak3-core.sh
split_boot;
flash_boot;
EOF

          DATE=$(date +%Y%m%d-%H%M)
          ZIP="LineageOS23.2-Kernel-a526b-${DATE}.zip"
          cd AnyKernel3
          zip -r9 "${GITHUB_WORKSPACE}/kernel-artifacts/${ZIP}" . \
            -x "*.git*" -x "README.md" -x "*.DS_Store*"
          echo "Created: ${ZIP}"

      # ── 15. Upload artifacts ──────────────────────────────────────────────
      - name: "Upload kernel artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "LineageOS23.2-Kernel-a526b-${{ github.sha }}"
          path: |
            kernel-artifacts/Image.gz
            kernel-artifacts/Image.gz-dtb
            kernel-artifacts/dtbo.img
            kernel-artifacts/modules/
            kernel-artifacts/*.zip
            kernel-artifacts/build.log
          retention-days: 30

      # ── 16. Debug on failure ──────────────────────────────────────────────
      - name: "Debug session (tmate)"
        if: ${{ failure() && github.event.inputs.debug_enabled == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
        timeout-minutes: 30

      # ── 17. Summary ───────────────────────────────────────────────────────
      - name: "Build summary"
        if: always()
        run: |
          echo "================================================"
          echo " LineageOS 23.2 Kernel — SM-A526B"
          echo " Clang  : r416183b (LineageOS git clone)"
          echo " GCC    : 4.9 aarch64/arm32 (LineageOS)"
          echo " BPF    : fuck-bpf sixteen-qpr2"
          echo " Commit : ${{ github.sha }}"
          if [ -f "${GITHUB_WORKSPACE}/kernel-artifacts/Image.gz" ]; then
            echo " STATUS : SUCCESS ✅"
          else
            echo " STATUS : FAILED ❌ — check build.log artifact"
          fi
          echo "================================================"
